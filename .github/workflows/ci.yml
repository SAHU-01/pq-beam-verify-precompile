name: PQ Beam CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: "1.25"

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install liboqs
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 --branch 0.15.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs
          mkdir build && cd build
          cmake -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Run unit tests
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I/usr/local/include" \
          CGO_LDFLAGS="-L/usr/local/lib -loqs -lcrypto" \
          go test ./pkg/... -v -count=1 -timeout 300s

      - name: Run benchmarks
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I/usr/local/include" \
          CGO_LDFLAGS="-L/usr/local/lib -loqs -lcrypto" \
          go test ./cmd/benchmark/ -bench=. -benchmem -count=3 -timeout 600s

      - name: Build CLI tools
        run: |
          CGO_ENABLED=1 \
          CGO_CFLAGS="-I/usr/local/include" \
          CGO_LDFLAGS="-L/usr/local/lib -loqs -lcrypto" \
          go build ./cmd/...

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install liboqs
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 --branch 0.15.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs
          mkdir build && cd build
          cmake -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-I/usr/local/include"
          CGO_LDFLAGS: "-L/usr/local/lib -loqs -lcrypto"

  solidity:
    name: Solidity Compilation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install solc
        run: |
          sudo add-apt-repository -y ppa:ethereum/ethereum
          sudo apt-get update
          sudo apt-get install -y solc

      - name: Compile contracts
        run: |
          solc --overwrite --abi --bin contracts/IPQVerify.sol -o build/
          solc --overwrite --abi --bin contracts/PQAccount.sol -o build/
          solc --overwrite --abi --bin contracts/PQKeyRotation.sol -o build/
